name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint-test:
    name: Python lint + test (pipeline, ml, forensics, collector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          # Project dependencies get installed here once requirements files exist:
          # pip install -r pipeline/requirements.txt
          # pip install -r ml/requirements.txt
          # pip install -r forensics/requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check . || true
          # Remove "|| true" once the codebase has enough Python to lint meaningfully

      - name: Run tests
        run: |
          pytest -q || true
          # Remove "|| true" once tests exist — hash-chain integrity tests are non-negotiable
          # per docs/GETTING_STARTED.md step 8

  wazuh-rule-validation:
    name: Validate Wazuh rules/decoders syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check XML well-formedness
        run: |
          shopt -s globstar nullglob
          for f in soc-integration/wazuh/**/*.xml; do
            echo "Checking $f"
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('$f')"
          done

