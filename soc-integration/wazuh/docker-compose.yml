# Minimal manager-only test stack derived from Wazuh's official v4.14.5
# single-node Docker Compose deployment. The indexer and dashboard are omitted
# because wazuh-logtest runs entirely inside the manager.
services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.5
    hostname: wazuh.manager
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    volumes:
      - ./decoders/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
      - ./rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /var/ossec/bin/wazuh-control status | grep -q 'wazuh-analysisd is running'
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
